# Site setup
title: SON Kiseok Technical Blog
description: Backend, Linux, data systemization, security and audit notes for career portfolio.
url: https://son1004007.github.io
baseurl: ""
paginate: 5
permalink: pretty
lang: ko-KR
future: true

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - AGENTS.md
  - docs

sass:
  sass_dir: _sass
  style: :compressed

# Options
# ga_analytics: UA-000000-0

# Author
author:
  name: SON Kiseok

# Custom vars
version: 3.0.1

# Navbar page list
nav:
  - title: Blog
    url: /archive

  - title: Study
    url: /study

  - title: About
    url: /about
